name: Daily hack post

on:
  schedule:
    # 13:00 IST = 07:30 UTC. Adjust to your audience's peak.
    - cron: "30 7 * * *"
  workflow_dispatch: {}   # lets you trigger manually to test

permissions:
  contents: write   # needed to commit the card + state counter

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pillow

      - name: Pick today's hack from the bank
        run: python scripts/pick.py

      - name: Render card
        run: cp scripts/make_card.py . && python scripts/render.py

      - name: Commit card + state for public URL and next-day counter
        run: |
          mkdir -p published
          STAMP=$(date +%Y%m%d)
          cp card.png "published/${STAMP}.png"
          git config user.name "hacks-bot"
          git config user.email "bot@users.noreply.github.com"
          git add "published/${STAMP}.png" state.json
          git commit -m "post ${STAMP}" || echo "nothing to commit"
          git push
          echo "IMAGE_URL=https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/published/${STAMP}.png" >> $GITHUB_ENV

      - name: Publish to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMAGE_URL: ${{ env.IMAGE_URL }}
        run: python scripts/publish.py
